name: Process Telegram Video

on:
  # Manual trigger with inputs
  workflow_dispatch:
    inputs:
      news_id:
        description: 'News ID to process'
        required: false
        type: string
      mode:
        description: 'Processing mode'
        required: true
        default: 'single'
        type: choice
        options:
          - single      # Process single news by ID
          - batch       # Process batch of pending videos
          - text_news   # Generate video from text+image news
      batch_limit:
        description: 'Number of videos to process in batch mode'
        required: false
        default: '10'
        type: string
      skip_remotion:
        description: 'Skip Remotion enhancement (upload raw video)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

  # Scheduled batch processing (every 30 minutes)
  schedule:
    - cron: '*/30 * * * *'

  # Webhook trigger from Supabase Edge Function
  repository_dispatch:
    types: [process-video]

jobs:
  process-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chrome dependencies (for Remotion)
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2t64

      - name: Install video-processor dependencies
        working-directory: ./scripts/video-processor
        run: npm ci

      - name: Install Remotion project dependencies
        working-directory: ./scripts/remotion-video
        run: npm ci

      - name: Process video(s)
        continue-on-error: ${{ github.event_name == 'schedule' || github.event_name == 'repository_dispatch' }}
        working-directory: ./scripts/video-processor
        env:
          # Telegram MTProto credentials
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

          # YouTube OAuth credentials
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}

          # Supabase credentials
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          # LLM credentials (NVIDIA NIM primary, Gemini fallback)
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

          # TTS credentials (Zvukogram neural TTS)
          ZVUKOGRAM_TOKEN: ${{ secrets.ZVUKOGRAM_TOKEN }}
          ZVUKOGRAM_EMAIL: ${{ secrets.ZVUKOGRAM_EMAIL }}

          # Processing parameters
          NEWS_ID: ${{ github.event.inputs.news_id || github.event.client_payload.news_id || '' }}
          MODE: ${{ github.event.inputs.mode || github.event.client_payload.mode || 'batch' }}
          BATCH_LIMIT: ${{ github.event.inputs.batch_limit || github.event.client_payload.batch_limit || '10' }}
          SKIP_REMOTION: ${{ github.event.inputs.skip_remotion || 'false' }}
        run: node index.js

      - name: Report results
        if: always()
        run: |
          echo "Video processing completed"
          echo "Mode: ${{ github.event.inputs.mode || github.event.client_payload.mode || 'batch' }}"
