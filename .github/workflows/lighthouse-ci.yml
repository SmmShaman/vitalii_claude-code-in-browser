name: Lighthouse CI

on:
  # Run after deploy completes on main
  workflow_run:
    workflows: ["Deploy to Netlify"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  lighthouse-mobile:
    name: Lighthouse (Mobile)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for deployment propagation
        run: sleep 30

      - name: Run Lighthouse (Mobile)
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://vitalii.no/
            https://vitalii.no/blog
            https://vitalii.no/news
          configPath: ./lighthouserc.js
          temporaryPublicStorage: true
          uploadArtifacts: true
        env:
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}

      - name: Upload Mobile Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-mobile-results
          path: .lighthouseci/
          retention-days: 30

  lighthouse-desktop:
    name: Lighthouse (Desktop)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for deployment propagation
        run: sleep 30

      - name: Run Lighthouse (Desktop)
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://vitalii.no/
            https://vitalii.no/blog
            https://vitalii.no/news
          configPath: ./lighthouserc-desktop.js
          temporaryPublicStorage: true
          uploadArtifacts: true
        env:
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}

      - name: Upload Desktop Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-desktop-results
          path: .lighthouseci/
          retention-days: 30

  summary:
    name: Results Summary
    runs-on: ubuntu-latest
    needs: [lighthouse-mobile, lighthouse-desktop]
    if: always()

    steps:
      - name: Download Mobile Results
        uses: actions/download-artifact@v4
        with:
          name: lighthouse-mobile-results
          path: mobile-results/

      - name: Download Desktop Results
        uses: actions/download-artifact@v4
        with:
          name: lighthouse-desktop-results
          path: desktop-results/

      - name: Generate Summary
        run: |
          echo "## Lighthouse CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          parse_results() {
            local dir="$1"
            local label="$2"
            echo "### ${label}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Page | Performance | Accessibility | Best Practices | SEO | LCP | CLS | FCP |" >> $GITHUB_STEP_SUMMARY
            echo "|------|-------------|---------------|----------------|-----|-----|-----|-----|" >> $GITHUB_STEP_SUMMARY

            for file in "${dir}"/lhr-*.json; do
              [ -f "$file" ] || continue

              url=$(jq -r '.finalUrl // .requestedUrl' "$file")
              path=$(echo "$url" | sed 's|https://vitalii.no||' | sed 's|^$|/|')

              perf=$(jq -r '(.categories.performance.score * 100 | floor)' "$file")
              a11y=$(jq -r '(.categories.accessibility.score * 100 | floor)' "$file")
              bp=$(jq -r '(.categories["best-practices"].score * 100 | floor)' "$file")
              seo=$(jq -r '(.categories.seo.score * 100 | floor)' "$file")

              lcp=$(jq -r '(.audits["largest-contentful-paint"].numericValue | floor)' "$file")
              cls=$(jq -r '(.audits["cumulative-layout-shift"].numericValue * 1000 | floor / 1000)' "$file")
              fcp=$(jq -r '(.audits["first-contentful-paint"].numericValue | floor)' "$file")

              # Emoji indicators for pass/fail
              perf_icon=$( [ "$perf" -ge 70 ] && echo "+" || echo "-" )
              a11y_icon=$( [ "$a11y" -ge 90 ] && echo "+" || echo "-" )
              lcp_icon=$( [ "$lcp" -le 2500 ] && echo "+" || echo "-" )
              cls_icon=$(echo "$cls < 0.1" | bc -l >/dev/null 2>&1 && [ "$(echo "$cls < 0.1" | bc -l)" = "1" ] && echo "+" || echo "-")
              fcp_icon=$( [ "$fcp" -le 1800 ] && echo "+" || echo "-" )

              echo "| \`${path}\` | ${perf} | ${a11y} | ${bp} | ${seo} | ${lcp}ms | ${cls} | ${fcp}ms |" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
          }

          parse_results "mobile-results" "Mobile"
          parse_results "desktop-results" "Desktop"

          echo "### Budgets" >> $GITHUB_STEP_SUMMARY
          echo "- Performance >= 70, Accessibility >= 90" >> $GITHUB_STEP_SUMMARY
          echo "- LCP < 2500ms, CLS < 0.1, FCP < 1800ms" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Full results uploaded as artifacts and to [Lighthouse CI temporary storage](https://storage.googleapis.com/lighthouse-infrastructure.appspot.com/reports/index.html)*" >> $GITHUB_STEP_SUMMARY
