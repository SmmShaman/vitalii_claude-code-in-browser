name: Discover Features

on:
  schedule:
    - cron: '0 2 * * *'  # 03:00 Oslo (winter CET=UTC+1)
    - cron: '0 1 * * *'  # 03:00 Oslo (summer CEST=UTC+2)
  workflow_dispatch:
    inputs:
      since:
        description: 'Scan period (e.g. "1 day ago", "7 days ago")'
        required: false
        default: '1 day ago'

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - repo: SmmShaman/vitalii_claude-code-in-browser
            project_id: portfolio
          - repo: SmmShaman/jobbot-norway
            project_id: jobbot
    steps:
      - name: Checkout ${{ matrix.repo }}
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repo }}
          fetch-depth: 100
          token: ${{ secrets.GH_PAT }}

      - name: Collect significant commits
        id: commits
        run: |
          SINCE="${{ inputs.since || '1 day ago' }}"
          echo "📦 Scanning ${{ matrix.repo }} since: $SINCE"

          COMMITS=$(git log --since="$SINCE" --oneline --stat --grep="^feat" --format="%h %s" 2>/dev/null | head -3000)

          if [ -z "$COMMITS" ]; then
            echo "No feat: commits found"
            echo "has_commits=false" >> $GITHUB_OUTPUT
          else
            COUNT=$(echo "$COMMITS" | grep -c "^[a-f0-9]" || echo 0)
            echo "Found $COUNT feat: commits"
            echo "has_commits=true" >> $GITHUB_OUTPUT
            echo "$COMMITS" > /tmp/commits.txt
          fi

      - name: Call discover-features Edge Function
        if: steps.commits.outputs.has_commits == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          COMMITS=$(cat /tmp/commits.txt)

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "${SUPABASE_URL}/functions/v1/discover-features" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -X POST -d "$(jq -n \
              --arg commits "$COMMITS" \
              --arg project_id "${{ matrix.project_id }}" \
              --arg repo_name "${{ matrix.repo }}" \
              '{commits: $commits, project_id: $project_id, repo_name: $repo_name}')")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "Response ($HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "❌ Feature discovery failed for ${{ matrix.repo }}"
            exit 1
          fi

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"❌ <b>Feature Discovery failed for ${{ matrix.repo }}!</b>\n\n🔗 <a href=\\\"${RUN_URL}\\\">View logs</a>\", \"parse_mode\": \"HTML\", \"disable_web_page_preview\": true}"
