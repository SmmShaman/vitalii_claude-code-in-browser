name: Publish Queue Watchdog

on:
  schedule:
    # Run every 10 minutes — cleans zombie articles and handles stale scheduled items
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest

    steps:
      - name: Zombie cleanup & schedule backup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🧟 Queue Watchdog — $(date -u '+%H:%M UTC')"

          # 1. Find and clean zombie articles (stuck >10 min in active status)
          CUTOFF=$(date -u -d '10 minutes ago' '+%Y-%m-%dT%H:%M:%SZ')
          echo "🕐 Cutoff: $CUTOFF"
          ZOMBIES=$(curl -s -X PATCH "$SUPABASE_URL/rest/v1/news?auto_publish_status=in.(pending,variant_selection,image_generation,content_rewrite,social_posting)&auto_publish_started_at=lt.$CUTOFF" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d '{"auto_publish_status": "failed", "auto_publish_error": "Zombie: watchdog auto-cleaned after 10min timeout"}' \
            2>/dev/null)

          ZOMBIE_COUNT=$(echo "$ZOMBIES" | jq -r 'length // 0' 2>/dev/null || echo "0")
          echo "🧟 Cleaned $ZOMBIE_COUNT zombie(s)"

          # 2. Clean stale scheduled articles (older than 24h still in scheduled status)
          STALE_CUTOFF=$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%SZ')
          STALE=$(curl -s -X PATCH "$SUPABASE_URL/rest/v1/news?auto_publish_status=eq.scheduled&scheduled_publish_at=lt.$STALE_CUTOFF" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d '{"auto_publish_status": "failed", "auto_publish_error": "Stale: scheduled >24h ago, never picked up"}' \
            2>/dev/null)

          STALE_COUNT=$(echo "$STALE" | jq -r 'length // 0' 2>/dev/null || echo "0")
          echo "📅 Cleaned $STALE_COUNT stale scheduled article(s)"

          # 3. Backup kickstart: if schedule-publisher cron missed, check for due scheduled articles
          IN_FLIGHT_LIST=$(curl -s "$SUPABASE_URL/rest/v1/news?auto_publish_status=in.(pending,variant_selection,image_generation,content_rewrite,social_posting)&select=id" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            2>/dev/null)
          IN_FLIGHT_COUNT=$(echo "$IN_FLIGHT_LIST" | jq -r 'length // 0' 2>/dev/null || echo "0")

          NOW=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          NEXT=$(curl -s "$SUPABASE_URL/rest/v1/news?auto_publish_status=eq.scheduled&scheduled_publish_at=lte.$NOW&order=scheduled_publish_at.asc&limit=1&select=id,telegram_message_id" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            2>/dev/null)

          NEXT_ID=$(echo "$NEXT" | jq -r '.[0].id // empty' 2>/dev/null)
          NEXT_MSG_ID=$(echo "$NEXT" | jq -r '.[0].telegram_message_id // empty' 2>/dev/null)

          if [ -n "$NEXT_ID" ] && [ "$IN_FLIGHT_COUNT" = "0" ]; then
            echo "🚀 Backup kickstart for scheduled article: $NEXT_ID"
            curl -s -X POST "$SUPABASE_URL/functions/v1/schedule-publisher" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Content-Type: application/json" \
              -d '{}' \
              --max-time 15 > /dev/null 2>&1 || true
            echo "✅ Schedule publisher triggered"
          elif [ -n "$NEXT_ID" ]; then
            echo "📋 Due scheduled items but $IN_FLIGHT_COUNT article(s) in-flight"
          else
            echo "📭 No due scheduled articles"
          fi

          # 4. Also check for legacy queued articles (backward compat)
          QUEUED=$(curl -s "$SUPABASE_URL/rest/v1/news?auto_publish_status=eq.queued&order=auto_publish_queued_at.asc&limit=1&select=id,telegram_message_id" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            2>/dev/null)

          QUEUED_ID=$(echo "$QUEUED" | jq -r '.[0].id // empty' 2>/dev/null)
          QUEUED_MSG_ID=$(echo "$QUEUED" | jq -r '.[0].telegram_message_id // empty' 2>/dev/null)

          if [ -n "$QUEUED_ID" ] && [ "$IN_FLIGHT_COUNT" = "0" ]; then
            echo "🚀 Kickstarting legacy queued article: $QUEUED_ID"
            curl -s -X POST "$SUPABASE_URL/functions/v1/auto-publish-news" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"newsId\": \"$QUEUED_ID\", \"source\": \"rss\", \"telegramMessageId\": $QUEUED_MSG_ID}" \
              --max-time 10 > /dev/null 2>&1 || true
            echo "✅ Legacy queue kickstarted"
          fi
