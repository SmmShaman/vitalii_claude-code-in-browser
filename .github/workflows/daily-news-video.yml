name: Daily News Video

on:
  # Telegram bot triggers render via repository_dispatch
  repository_dispatch:
    types: [daily-video-render]

  # Manual trigger
  workflow_dispatch:
    inputs:
      language:
        description: 'Video language'
        required: true
        default: 'no'
        type: choice
        options:
          - 'no'    # Norwegian
          - 'en'    # English
      format:
        description: 'Video format'
        required: true
        default: 'horizontal'
        type: choice
        options:
          - horizontal  # 1920x1080 (YouTube/LinkedIn)
          - vertical    # 1080x1920 (Shorts/Reels/TikTok)
      target_date:
        description: 'Target date (YYYY-MM-DD), default: yesterday'
        required: false
        type: string
      youtube_privacy:
        description: 'YouTube privacy (public/unlisted/private)'
        required: false
        default: 'public'
        type: choice
        options:
          - public
          - unlisted
          - private

jobs:
  daily-compilation:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chrome dependencies (for Remotion)
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2t64

      - name: Install video-processor dependencies
        working-directory: ./scripts/video-processor
        run: npm ci

      - name: Install Remotion project dependencies
        working-directory: ./scripts/remotion-video
        run: npm ci

      - name: Generate daily news compilation
        working-directory: ./scripts/video-processor
        env:
          # YouTube
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}

          # Supabase
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          # Azure OpenAI (video director + script generation)
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}

          # Google AI (Gemini thumbnail)
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

          # TTS (Zvukogram)
          ZVUKOGRAM_TOKEN: ${{ secrets.ZVUKOGRAM_TOKEN }}
          ZVUKOGRAM_EMAIL: ${{ secrets.ZVUKOGRAM_EMAIL }}

          # Avatar (fal.ai EchoMimicV3)
          FAL_KEY: ${{ secrets.FAL_KEY }}
          ENABLE_AVATAR: ${{ secrets.ENABLE_AVATAR || 'false' }}
          AVATAR_SOURCE_PHOTO_URL: ${{ secrets.AVATAR_SOURCE_PHOTO_URL }}

          # Video settings
          LANGUAGE: ${{ github.event.client_payload.language || github.event.inputs.language || 'no' }}
          FORMAT: ${{ github.event.client_payload.format || github.event.inputs.format || 'horizontal' }}
          TARGET_DATE: ${{ github.event.client_payload.target_date || github.event.inputs.target_date || '' }}
          DRAFT_ID: ${{ github.event.client_payload.draft_id || '' }}
          YOUTUBE_PRIVACY: ${{ github.event.client_payload.youtube_privacy || github.event.inputs.youtube_privacy || 'public' }}
        run: node daily-compilation.js

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TARGET="${{ github.event.client_payload.target_date || github.event.inputs.target_date || 'yesterday' }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"❌ <b>Video generation failed!</b>\n\n📅 Date: ${TARGET}\n🔗 <a href=\\\"${RUN_URL}\\\">View logs</a>\", \"parse_mode\": \"HTML\", \"disable_web_page_preview\": true}"

      - name: Report results
        if: always()
        run: |
          echo "Daily news video generation completed"
          echo "Language: ${{ github.event.inputs.language || 'no' }}"
          echo "Format: ${{ github.event.inputs.format || 'vertical' }}"
