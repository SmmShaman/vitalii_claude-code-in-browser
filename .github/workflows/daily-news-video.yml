name: Daily News Video

on:
  # Daily cron: 07:00 Oslo (05:00 UTC summer CEST, 06:00 UTC winter CET)
  # Triggers auto_digest → bot sends script for approval → moderator approves → render
  schedule:
    - cron: '0 5 * * *'  # 07:00 Oslo (summer CEST=UTC+2)
    - cron: '0 6 * * *'  # 07:00 Oslo (winter CET=UTC+1)

  # Telegram bot triggers render via repository_dispatch (after moderator approval)
  repository_dispatch:
    types: [daily-video-render]

  # Manual trigger
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: auto_digest (LLM selects + script) or render (full video)'
        required: true
        default: 'auto_digest'
        type: choice
        options:
          - auto_digest
          - render
      language:
        description: 'Video language (render mode only)'
        required: true
        default: 'no'
        type: choice
        options:
          - 'no'    # Norwegian
          - 'en'    # English
      format:
        description: 'Video format (render mode only)'
        required: true
        default: 'horizontal'
        type: choice
        options:
          - horizontal  # 1920x1080 (YouTube/LinkedIn)
          - vertical    # 1080x1920 (Shorts/Reels/TikTok)
      target_date:
        description: 'Target date (YYYY-MM-DD), default: yesterday'
        required: false
        type: string
      youtube_privacy:
        description: 'YouTube privacy (render mode only)'
        required: false
        default: 'public'
        type: choice
        options:
          - public
          - unlisted
          - private

jobs:
  # ── Job 1: Auto Digest (cron + manual auto_digest mode) ──
  # Calls Edge Function to: fetch articles → LLM ranks top-10 → writes script → sends to bot
  auto-digest:
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'auto_digest')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger auto digest via Edge Function
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          TARGET_DATE="${{ github.event.inputs.target_date || '' }}"
          QUERY="action=auto_digest"
          if [ -n "$TARGET_DATE" ]; then
            QUERY="${QUERY}&target_date=${TARGET_DATE}"
          fi

          echo "🤖 Calling auto_digest..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "${SUPABASE_URL}/functions/v1/daily-video-bot?${QUERY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -X POST -d '{}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Response ($HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "❌ Auto digest failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "✅ Auto digest triggered successfully"

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"❌ <b>Auto digest failed!</b>\n\n🔗 <a href=\\\"${RUN_URL}\\\">View logs</a>\", \"parse_mode\": \"HTML\", \"disable_web_page_preview\": true}"

  # ── Job 2: Render Video (repository_dispatch from bot + manual render mode) ──
  render-video:
    if: >-
      github.event_name == 'repository_dispatch' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'render')
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chrome dependencies (for Remotion)
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2t64

      - name: Install video-processor dependencies
        working-directory: ./scripts/video-processor
        run: npm ci

      - name: Install Remotion project dependencies
        working-directory: ./scripts/remotion-video
        run: npm ci

      - name: Generate daily news compilation
        working-directory: ./scripts/video-processor
        env:
          # YouTube
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}

          # Supabase
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          # Azure OpenAI (video director + script generation)
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}

          # Google AI (Gemini thumbnail)
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

          # TTS (Zvukogram)
          ZVUKOGRAM_TOKEN: ${{ secrets.ZVUKOGRAM_TOKEN }}
          ZVUKOGRAM_EMAIL: ${{ secrets.ZVUKOGRAM_EMAIL }}

          # Avatar (fal.ai EchoMimicV3)
          FAL_KEY: ${{ secrets.FAL_KEY }}
          ENABLE_AVATAR: ${{ secrets.ENABLE_AVATAR || 'false' }}
          AVATAR_SOURCE_PHOTO_URL: ${{ secrets.AVATAR_SOURCE_PHOTO_URL }}

          # Telegram (completion notification)
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          # Video settings
          LANGUAGE: ${{ github.event.client_payload.language || github.event.inputs.language || 'no' }}
          FORMAT: ${{ github.event.client_payload.format || github.event.inputs.format || 'horizontal' }}
          TARGET_DATE: ${{ github.event.client_payload.target_date || github.event.inputs.target_date || '' }}
          DRAFT_ID: ${{ github.event.client_payload.draft_id || '' }}
          YOUTUBE_PRIVACY: ${{ github.event.client_payload.youtube_privacy || github.event.inputs.youtube_privacy || 'public' }}
        run: node daily-compilation.js

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TARGET="${{ github.event.client_payload.target_date || github.event.inputs.target_date || 'yesterday' }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"❌ <b>Video render failed!</b>\n\n📅 Date: ${TARGET}\n🔗 <a href=\\\"${RUN_URL}\\\">View logs</a>\", \"parse_mode\": \"HTML\", \"disable_web_page_preview\": true}"

      - name: Report results
        if: always()
        run: |
          echo "Daily news video generation completed"
          echo "Language: ${{ github.event.inputs.language || 'no' }}"
          echo "Format: ${{ github.event.inputs.format || 'horizontal' }}"
